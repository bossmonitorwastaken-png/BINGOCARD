<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGAO Bingo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0c; --panel-bg:#131519; --line:#2a2d36;
    --blue:#3f8ce8; --blue-dim:#152436; --white:#ffffff; --text-dim:#8a90a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    background: var(--bg);
    font-family:'Space Mono', monospace; color:var(--white);
    display:flex; justify-content:center; padding:32px 16px 60px;
  }
  .wrap{ width:100%; max-width:460px; }
  .eyebrow{ text-align:center; letter-spacing:0.25em; font-size:11px; color:var(--blue); text-transform:uppercase; margin-bottom:6px; }
  h1{ font-family:'Fredoka',sans-serif; font-weight:700; font-size:clamp(26px,7vw,36px); text-align:center; margin:0 0 4px; color:var(--white); }
  h1 span{ color:var(--bg); -webkit-text-stroke:1.5px var(--blue); }
  .sub{ text-align:center; color:var(--text-dim); font-size:12px; margin-bottom:6px; }
  .sync-badge{ text-align:center; font-size:10.5px; color:var(--text-dim); margin-bottom:18px; }
  .sync-badge.live{ color:var(--blue); font-weight:700; }

  .panel{
    aspect-ratio:1/1; display:flex; flex-direction:column; gap:8px;
    background:var(--panel-bg); border:2px solid var(--blue); border-radius:16px; padding:12px;
  }
  .letters{ display:flex; gap:6px; }
  .letter{
    flex:1; text-align:center; font-family:'Fredoka',sans-serif; font-weight:700;
    font-size:clamp(18px,5.5vw,26px); color:var(--white); border:1px solid var(--line);
    border-radius:8px; padding:4px 0; transition:all 0.25s ease;
  }
  .letter.struck{ color:var(--text-dim); text-decoration:line-through; border-color:var(--blue); background:var(--blue-dim); }

  .grid{ flex:1; display:grid; grid-template-columns:repeat(5,1fr); grid-template-rows:repeat(5,1fr); gap:6px; }
  .cell{
    background:#1a1d24; border:1px solid var(--line); border-radius:8px;
    padding:4px; display:flex; align-items:center; justify-content:center; text-align:center;
    font-size:10.5px; line-height:1.25; cursor:pointer; user-select:none; position:relative;
    color:var(--white);
    transition:transform 0.12s ease, border-color 0.2s ease;
  }
  .cell:hover{ border-color:var(--blue); }
  .cell:active{ transform:scale(0.96); }
  .cell.free{ background:linear-gradient(160deg,var(--blue-dim),#1a1d24); border-color:var(--blue); font-family:'Fredoka',sans-serif; font-weight:600; font-size:13px; color:var(--white); }
  .cell .emoji{ font-size:22px; }
  .cell.hidden-clue{ color:var(--text-dim); font-family:'Fredoka',sans-serif; font-weight:600; font-size:12px; letter-spacing:0.02em; }
  .cell.marked{ background:var(--blue-dim); border-color:var(--blue); }
  .cell.marked::after{
    content:""; position:absolute; inset:5px; border:2.5px solid var(--white); border-radius:6px;
    transform:rotate(-6deg); pointer-events:none;
  }
  .cell.win{ border-color:var(--blue); box-shadow:0 0 0 2px var(--blue), 0 0 10px #3f8ce866; }

  .status{ text-align:center; margin-top:16px; min-height:26px; font-family:'Fredoka',sans-serif; font-weight:600; font-size:17px; color:var(--blue); }

  .controls{ display:flex; justify-content:center; gap:10px; margin-top:12px; }
  button{
    font-family:'Space Mono',monospace; font-size:11.5px; letter-spacing:0.05em; text-transform:uppercase;
    color:var(--white); background:transparent; border:1px solid var(--line); border-radius:8px;
    padding:8px 16px; cursor:pointer; transition:all 0.2s ease;
  }
  button:hover{ border-color:var(--blue); color:var(--blue); }

  .editor{ display:none; margin-top:18px; background:var(--panel-bg); border:2px solid var(--blue); border-radius:12px; padding:14px; }
  .editor.open{ display:block; }
  .editor h2{ font-family:'Fredoka',sans-serif; font-size:14px; margin:0 0 12px; color:var(--white); }
  .edit-row{ border-bottom:1px solid var(--line); padding:10px 0; }
  .edit-row:last-child{ border-bottom:none; }
  .edit-row label{ display:block; font-size:10px; color:var(--text-dim); margin-bottom:3px; text-transform:uppercase; letter-spacing:0.05em; }
  .edit-row input[type=text]{
    width:100%; background:#0f1116; border:1px solid var(--line); border-radius:6px;
    color:var(--white); font-family:'Space Mono',monospace; font-size:12px; padding:6px 8px; margin-bottom:6px;
  }
  .toggle-line{ display:flex; align-items:center; gap:8px; font-size:11px; color:var(--text-dim); }
  .editor .controls{ margin-top:14px; }
  .editor button{ color:var(--white); border-color:var(--line); }
  .editor button:hover{ background:var(--blue); color:var(--bg); border-color:var(--blue); }
  footer{ text-align:center; margin-top:26px; font-size:10px; color:var(--text-dim); letter-spacing:0.05em; }
  @media (max-width:420px){ .cell{ font-size:9.5px; } .cell .emoji{ font-size:18px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">emergency meeting</div>
  <h1>EGAO <span>BINGO</span></h1>
  <div class="sub">tap a square live &middot; 5 lines strikes the whole word</div>
  <div class="sync-badge" id="syncBadge">checking sync...</div>

  <div class="panel">
    <div class="letters" id="letters"></div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="status" id="status"></div>
  <div class="controls">
    <button id="editBtn">Edit clues</button>
    <button id="resetBtn">Reset board</button>
  </div>

  <div class="editor" id="editor">
    <h2>Edit clue visibility</h2>
    <div id="editList"></div>
    <div class="controls">
      <button id="saveEditBtn">Save changes</button>
      <button id="cancelEditBtn">Cancel</button>
    </div>
  </div>

  <footer>changes sync to everyone viewing this page</footer>
</div>

<script>
/* ---------- one-time setup ----------
   This is a static file, so real-time shared state needs a tiny free
   key-value backend. We use kvdb.io (no signup beyond an email, no
   card). Steps:
     1. Run:  curl -d 'email=you@example.com' https://kvdb.io
     2. It returns a bucket id, e.g. Fd55uogXyxYdnXJvnyN8Xo
     3. Paste it below as BUCKET_ID.
   Until you do, the board still fully works, it just saves locally
   to this browser only instead of syncing across visitors. */
const BUCKET_ID = "REPLACE_WITH_YOUR_KVDB_BUCKET_ID";
const SYNC_ON = BUCKET_ID && BUCKET_ID.indexOf("REPLACE_WITH") !== 0;
const KV_URL = `https://kvdb.io/${BUCKET_ID}/egao-bingo-state`;
const LOCAL_KEY = "egaoBingoState";

const items = [
  {type:"clue", teaser:"Triple", full:"Triple kill in one room"},
  {type:"emoji", value:"👺"},
  {type:"clue", teaser:"Code", full:'Someone asks for "code"'},
  {type:"emoji", value:"😭"},
  {type:"clue", teaser:"Lafda", full:"Lafda in chat"},
  {type:"clue", teaser:"Racist", full:"Racist comment caught in chat"},
  {type:"clue", teaser:"Banned", full:"Banned for using cuss words"},
  {type:"clue", teaser:"100 IQ", full:"100 IQ escape from a tricky spot"},
  {type:"clue", teaser:"Funny", full:"Just a funny random moment"},
  {type:"clue", teaser:"Self-report", full:"Impostor self-reports"},
  {type:"clue", teaser:"Alibi", full:"Fake task alibi busted"},
  {type:"clue", teaser:"Rage quit", full:"Someone rages or quits"},
  {type:"free"},
  {type:"clue", teaser:"Double kill", full:"Double kill, same room"},
  {type:"clue", teaser:"Wrong call", full:"Wrong kill call, blames innocent"},
  {type:"clue", teaser:"Not me", full:'"It wasn\'t me" said seriously'},
  {type:"clue", teaser:"Vented", full:"Vented right in front of everyone"},
  {type:"clue", teaser:"Task rush", full:"Task rush right before meeting"},
  {type:"clue", teaser:"Emoji spam", full:"Someone spams emojis in chat"},
  {type:"clue", teaser:"Sus", full:"Sus for following a crewmate"},
  {type:"clue", teaser:"Close win", full:"Close win, one impostor left"},
  {type:"clue", teaser:"Bro", full:'Someone says "bro" or "bruh"'},
  {type:"clue", teaser:"AFK", full:"AFK player gets voted out"},
  {type:"clue", teaser:"Camera", full:"Someone caught on the camera"},
  {type:"clue", teaser:"Meeting", full:"Meeting called for basically nothing"}
];

const letters = ["B","I","N","G","O"];
const lines = [];
for (let r=0;r<5;r++) lines.push([0,1,2,3,4].map(c=>r*5+c));
for (let c=0;c<5;c++) lines.push([0,1,2,3,4].map(r=>r*5+c));
lines.push([0,6,12,18,24]);
lines.push([4,8,12,16,20]);

function defaultConfig(){
  const cfg = {};
  items.forEach((it,i)=>{ if(it.type==="clue") cfg[i] = {hidden:true, revealText:it.full}; });
  return cfg;
}
function defaultState(){
  return { marks: items.map(it=>it.type==="free"), config: defaultConfig() };
}

let state = defaultState();
let lastSynced = "";
let editing = false;

function loadLocal(){
  try{ const s = JSON.parse(localStorage.getItem(LOCAL_KEY)); if(s) return s; }catch(e){}
  return null;
}
function saveLocal(s){ try{ localStorage.setItem(LOCAL_KEY, JSON.stringify(s)); }catch(e){} }

async function fetchRemote(){
  const res = await fetch(KV_URL, {cache:"no-store"});
  if(res.status===404) return null;
  if(!res.ok) throw new Error("fetch failed");
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}
async function pushRemote(s){
  await fetch(KV_URL, {method:"POST", body: JSON.stringify(s)});
}

function completedCount(){
  return lines.filter(line => line.every(i => state.marks[i])).length;
}
function winningCells(){
  const won = new Set();
  lines.forEach(line=>{ if(line.every(i=>state.marks[i])) line.forEach(i=>won.add(i)); });
  return won;
}

function renderLetters(){
  const box = document.getElementById("letters");
  const count = Math.min(completedCount(), 5);
  box.innerHTML = "";
  letters.forEach((L,i)=>{
    const d = document.createElement("div");
    d.className = "letter" + (i < count ? " struck" : "");
    d.textContent = L;
    box.appendChild(d);
  });
}

function renderGrid(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const won = winningCells();
  items.forEach((item,i)=>{
    const cell = document.createElement("div");
    cell.className = "cell";
    if(state.marks[i]) cell.classList.add("marked");
    if(won.has(i)) cell.classList.add("win");

    if(item.type==="free"){
      cell.classList.add("free");
      cell.textContent = "FREE";
    } else if(item.type==="emoji"){
      const span = document.createElement("span");
      span.className="emoji"; span.textContent=item.value;
      cell.appendChild(span);
    } else {
      const cfg = state.config[i] || {hidden:true, revealText:item.full};
      if(cfg.hidden){
        cell.classList.add("hidden-clue");
        cell.textContent = item.teaser;
      } else {
        cell.textContent = cfg.revealText || item.full;
      }
    }

    cell.addEventListener("click", async ()=>{
      if(item.type==="free" || editing) return;
      state.marks[i] = !state.marks[i];
      await persist();
    });

    grid.appendChild(cell);
  });
}

function renderStatus(){
  const count = completedCount();
  const el = document.getElementById("status");
  if(count >= 5) el.textContent = "EGAO BINGO!";
  else if(count > 0) el.textContent = `${count} of 5 lines`;
  else el.textContent = "";
}

function renderAll(){
  renderLetters();
  renderGrid();
  renderStatus();
}

async function persist(){
  saveLocal(state);
  renderAll();
  if(SYNC_ON){
    try{ await pushRemote(state); lastSynced = JSON.stringify(state); }catch(e){}
  }
}

async function syncLoop(){
  if(!SYNC_ON) return;
  try{
    const remote = await fetchRemote();
    if(remote){
      const asText = JSON.stringify(remote);
      if(asText !== lastSynced){
        state = remote;
        lastSynced = asText;
        saveLocal(state);
        if(!editing) renderAll();
      }
    }
  }catch(e){}
}

function buildEditor(){
  const list = document.getElementById("editList");
  list.innerHTML = "";
  items.forEach((item,i)=>{
    if(item.type!=="clue") return;
    const cfg = state.config[i] || {hidden:true, revealText:item.full};
    const row = document.createElement("div");
    row.className = "edit-row";
    row.innerHTML = `
      <label>Teaser word (always shown)</label>
      <input type="text" data-field="teaser" data-i="${i}" value="${item.teaser.replace(/"/g,'&quot;')}">
      <label>Text shown when revealing</label>
      <input type="text" data-field="reveal" data-i="${i}" value="${(cfg.revealText||item.full).replace(/"/g,'&quot;')}">
      <div class="toggle-line">
        <input type="checkbox" data-field="hidden" data-i="${i}" ${cfg.hidden ? "checked" : ""}>
        <span>Keep hidden (show teaser only)</span>
      </div>`;
    list.appendChild(row);
  });
}

document.getElementById("editBtn").addEventListener("click", ()=>{
  editing = true;
  buildEditor();
  document.getElementById("editor").classList.add("open");
});
document.getElementById("cancelEditBtn").addEventListener("click", ()=>{
  editing = false;
  document.getElementById("editor").classList.remove("open");
});
document.getElementById("saveEditBtn").addEventListener("click", async ()=>{
  const list = document.getElementById("editList");
  list.querySelectorAll(".edit-row").forEach(row=>{
    const teaserInput = row.querySelector('[data-field="teaser"]');
    const revealInput = row.querySelector('[data-field="reveal"]');
    const hiddenInput = row.querySelector('[data-field="hidden"]');
    const i = parseInt(teaserInput.dataset.i, 10);
    items[i].teaser = teaserInput.value || items[i].teaser;
    state.config[i] = { hidden: hiddenInput.checked, revealText: revealInput.value || items[i].full };
  });
  editing = false;
  document.getElementById("editor").classList.remove("open");
  await persist();
});

document.getElementById("resetBtn").addEventListener("click", async ()=>{
  state = defaultState();
  await persist();
});

async function init(){
  const badge = document.getElementById("syncBadge");
  const local = loadLocal();
  if(local) state = local;

  if(SYNC_ON){
    try{
      const remote = await fetchRemote();
      if(remote){ state = remote; lastSynced = JSON.stringify(remote); }
      else { await pushRemote(state); lastSynced = JSON.stringify(state); }
      badge.textContent = "synced across all visitors";
      badge.classList.add("live");
    }catch(e){
      badge.textContent = "sync unavailable, saving locally";
    }
    setInterval(syncLoop, 4000);
  } else {
    badge.textContent = "local only \u2014 add a bucket id in the code to sync everyone";
  }
  renderAll();
}
init();
</script>
</body>
</html>
